# ==============================================================================
# Cairn: Master Intent Artifact (System Charter)
# ==============================================================================
# Cairn — the agent-native retrieval engine.
#
# A cairn is a stack of stones left by those who passed before, marking the way
# for those who come after. This engine is the same idea for AI agents: a
# navigation layer of canonical entities and relations that marks the route to
# context — built incrementally, consulted before every retrieval.
#
# Version: 0.2.1 (CHARTER — post-research: north star + market positioning + no-query-language principle + open questions)
# Created: 2026-06-26 · Updated: 2026-06-27
