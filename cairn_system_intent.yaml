changelog:
  - version: "0.1.0"
    date: "2026-06-26"
    change: "Initial system charter: thesis, three inversions, three primitives (adaptive gate, entity-first routing, signal orchestration), seven architectural invariants (critical-last), alternatives, and risks."
    reason: "Seed the project as an OSS, agent-native retrieval engine, agnostic to any specific user/project/stack, in the IVD intent format. Pre-research north star to be hardened through the research->tech-spec->refined-intent phases."
    evidence: "Landscape research on Graphiti/Zep, FalkorDB, vector-RAG, and agentic grep; entity-resolution literature."

  - version: "0.1.1"
    date: "2026-06-26"
    change: "Resolved the zero-LLM ambiguity surfaced by the context-assembly/lexical/eval gap research: the hot-path invariant means zero GENERATIVE-LLM and zero remote-API — local deterministic discriminative models (cross-encoder reranker, encoder classifier) ARE admissible; a stricter zero-ML mode is an explicit opt-in. Promoted constraint assumption_status KNOWN."
    reason: "Cross-encoder reranking is a large, deterministic, local, offline quality gain that does not violate determinism, local-first, or cost invariants; banning it would forfeit quality for no real purity benefit. Purists keep a zero-ML mode."
    evidence: "context/CONTEXT_ASSEMBLY_AND_PACKING_RESEARCH_2026.md §3 (LLM-free vs LLM-dependent table); LLMLingua-2 (arXiv:2403.12968) classifier is non-generative."

  - version: "0.2.0"
    date: "2026-06-27"
    change: >
      Added the north_star chain (Super Agent -> trustworthy world model -> entities -> Cairn) and a
      market_positioning section (crowded-market reality, the determinism wedge, best_for / not_best_for,
      three honest caveats: conditional / unproven / distribution, and the build_boundary). Reframed the
      summary around 'deterministic world-model engine for super-agents'. Added a competitive/distribution
      risk. Established ENTITIES (Primitive B) as the foundational subsystem; goal scoped to Super Agent,
      explicitly NOT AGI.
      Supporting artifacts produced this session: 5 theoretical-foundation research docs
      (foundations/) + patterns_entities.yaml (TH-1..TH-5 + OP-28/34/35); 4 gap-fill OPs
      (OP-32 RRF fusion, OP-33 gate cost model, OP-34 traversal, OP-35 ontology authoring).
    reason: >
      Conversation surfaced the real purpose (Cairn is the world-model substrate of a super agent, not a
      generic RAG library) and the honest competitive position (the entity-world space is crowded and funded;
      Cairn's only defensible edge is the determinism wedge, and 'best' is a thesis until the OP-31 benchmark
      proves it). Writing this down so it is not re-derived or lost when the tech spec begins.
      The build_boundary is recorded to prevent the 'builds the map' scope from sliding into 'builds a database'.
    evidence: >
      Landscape verification (internal docs/research/databases/ + external: Mem0 state-of-agent-memory 2026,
      Vectorize/Atlan comparisons, dedupe/Splink for ER); ENTITY_RELATIONSHIP_RESOLUTION research on
      discriminative-extraction reliability + determinism; the 5 foundations docs grounding the determinism thesis."

  - version: "0.2.1"
    date: "2026-06-27"
    change: >
      Documented the no-query-language / compile-and-delegate principle (interface.design_principle_no_query_language
      + corollary folded into the storage_agnostic_core constraint — kept constraint count at 7 per IVD Rule 6,
      did NOT add an 8th). Added an open_questions section with 4 load-bearing, tech-spec-blocking decisions:
      OQ-1 where relations live + scale cutoff, OQ-2 doc_id stability/resolvability contract, OQ-3 traversal-intent
      → backend-query compilation, OQ-4 bitemporal open-end sentinel.
    reason: >
      The charter read first but knew less than the patterns (OP-34 had the GraphAdapter/delegation; the charter did not).
      The no-query-language principle is what keeps Cairn from being a graph DB and is the inversion that makes it
      agent-native, so it belongs at charter tier. Open design decisions were invisible (only the stress-test gate was
      marked pending); surfacing the load-bearing ones prevents them being silently assumed at tech-spec.
    evidence: "Neptune query languages verified (AWS docs: Gremlin/openCypher/SPARQL); Neptune already listed as a backend in GRAPH_DATABASES_AND_ENTITY_LIBRARIES_2026.md; OP-34 GraphAdapter Protocol in patterns_entities.yaml."
