[project]
name = "cairn-retrieval"
version = "0.1.0"
description = "Agent-retrieval layer on top of the Cairn entity engine — adaptive gate, signal orchestration (lexical/semantic/graph), and minimal context assembly. Zero generative-LLM on the hot path."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Leo Celis", email = "hello@leocelis.com" }]
keywords = ["retrieval", "rag", "ai-agents", "reranking", "context-assembly", "deterministic"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]
dependencies = ["cairn-engine ~= 0.1.0"]

# NOTE: no optional extras yet — accelerators (ripgrep scan wrapper, local
# cross-encoder reranker) will be declared here WHEN the drop-in code lands.
# Declaring an extra that changes nothing misleads users (truth-in-packaging).

[project.urls]
Homepage = "https://github.com/leocelis/cairn"
Source = "https://github.com/leocelis/cairn"
Issues = "https://github.com/leocelis/cairn/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cairn_retrieval"]
