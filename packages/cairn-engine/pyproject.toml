[project]
name = "cairn-engine"
version = "0.1.0"
description = "Deterministic entity / world-model engine for AI agents — resolve messy references to canonical IDs, traverse relations, author the alias table. Storage-agnostic, local-first, zero generative-LLM on the hot path."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Leo Celis", email = "hello@leocelis.com" }]
keywords = ["entity-resolution", "knowledge-graph", "ai-agents", "retrieval", "deterministic", "local-first"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]
# Core is zero-dependency by design. Opt-in tiers (semantic embedder, LLM
# arbiter, NER extractors) take CALLER-SUPPLIED callables — the engine never
# imports third-party packages, so there are no extras to install. (Extras will
# return only if/when a config hook actually consumes them.)
dependencies = []

# The distribution is `cairn-engine`; the import package is `cairn_engine`.
# ("cairn" was already taken on PyPI — the brand stays "Cairn" in the docs.)
[project.urls]
Homepage = "https://github.com/leocelis/cairn"
Source = "https://github.com/leocelis/cairn"
Issues = "https://github.com/leocelis/cairn/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cairn_engine"]
