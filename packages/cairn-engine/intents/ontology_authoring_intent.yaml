scope:
  level: "module"
  type: "feature"
  granularity: "fine"

metadata:
  feature_id: "cairn_ontology_authoring"
  category: "agent_infrastructure"
  tags: ["ontology", "authoring", "dedup", "build-time", "minhash"]
  status: "in_progress"
  introduced_version: "0.1.0"

intent:
  summary: "BUILD-TIME ontology authoring: extract candidate entities from text (deterministic stdlib heuristic by default; GLiNER/LLM as explicit user-supplied callables), dedup them (exact -> MinHash/LSH + token-sort), emit mirror edges, stage everything for human review, and serialize the frozen table deterministically. Cairn itself never imports third-party extractors and never touches the network — even at build time."
  goal: |
    Implement the authoring slice of M1.3: author_from_text (Candidate staging),
    three-tier dedup (tier 3 = flag-for-review, never auto-merge), the mirror-edge
    helper (the M1.4 finding: post->concept edges alone make next-reads
    asymmetric), and deterministic JSON round-trip serialization.
  success_metric: "All constraint tests pass in the project venv, stdlib-only; authoring output is byte-stable; nothing enters a frozen table without an explicit human-driven add."
  stakeholders:
    - "cairn users authoring their corpus ontology (the WordPress use case M1.6)"

interface:
  type: "library"
  tools:
    - name: "author_from_text"
      description: "author_from_text(text, *, source, extractor='heuristic', entity_type='concept') -> list[Candidate]. extractor: 'heuristic' (stdlib default) or a user callable (GLiNER/LLM wrappers) returning surface strings."
      parameters:
        - name: "text"
          type: "string"
          required: true
          description: "Corpus text to extract candidate entities from"
        - name: "source"
          type: "string"
          required: true
          description: "Provenance (corpus path / post id)"
        - name: "extractor"
          type: "string|callable"
          required: false
          description: "'heuristic' | callable(text)->surfaces. Named third-party extractors are NOT importable by string — pass a callable (explicit opt-in)."
      returns: "list[Candidate] — status 'pending_review'; NEVER auto-added to a table"
      test: "packages/cairn-engine/tests/unit/test_ontology.py"
    - name: "dedup_candidates"
      description: "Three-tier build-time dedup: exact/normalized -> MinHash/LSH + token-sort confirm -> ambiguous band flagged for human review (never auto-merged)."
      parameters:
        - name: "candidates"
          type: "array"
          required: true
          description: "Candidates from author_from_text"
      returns: "DedupReport(unique, duplicates, review_pairs)"
      test: "packages/cairn-engine/tests/unit/test_ontology.py"
    - name: "with_mirror_edges"
      description: "Emit reverse edges for asymmetric predicates (mentions -> mentioned_in) so traversal is symmetric (OP-28 reversal mitigation; M1.4 finding)."
      parameters:
        - name: "entities"
          type: "array"
          required: true
          description: "Entities whose relations need mirrors"
      returns: "tuple[Entity, ...] with mirror edges added to the targets"
      test: "packages/cairn-engine/tests/unit/test_ontology.py"

# Critical constraints LAST (position bias — UltraBench 2025).
constraints:
  - name: "heuristic_extractor_deterministic"
    requirement: "The default extractor is pure stdlib and deterministic: candidate surfaces = maximal runs (1..5 tokens) of capitalized/upper tokens in the ORIGINAL text, broken at clause punctuation (a comma/period ends the run so 'Cloud, API' is two candidates, not one), plus quoted phrases; long runs emit consecutive <=5-token chunks (no tokens dropped); chunks are trimmed of LEADING/TRAILING stopwords (a FIXED, documented list — sentence-starters and pronouns otherwise dominate real prose); single-token candidates that are stopwords or contractions are rejected; possessive suffixes stripped; deduped preserving first-occurrence order. Same text -> byte-identical candidates. It is a candidate GENERATOR for human review, not a precision NER."
    test: "packages/cairn-engine/tests/unit/test_ontology.py::test_heuristic_extractor_deterministic"
    test_provenance: "execution_derived"
    execution_oracle:
      golden_fixture: "hand-computed candidates for a fixed paragraph (title-case runs + quoted phrase)"
    assumption_status: "KNOWN"
    entropy: "near-zero"
    priority: 6

  - name: "extractors_explicit_never_autodetected"
    requirement: "Third-party/LLM extractors are supplied as CALLABLES by the caller. Passing extractor='llm' or 'gliner' as a string raises ValueError with guidance — cairn never imports an optional package implicitly and NEVER makes a network call itself, even at build time; the user's callable owns that boundary."
    test: "packages/cairn-engine/tests/unit/test_ontology.py::test_extractor_strings_rejected_callables_accepted"
    test_provenance: "execution_derived"
    execution_oracle:
      property_test: "'llm'/'gliner' strings raise; a plain callable is used verbatim; ontology.py imports no third-party modules"
    assumption_status: "KNOWN"
    entropy: "near-zero"
    priority: 5

  - name: "dedup_tier1_exact_normalized"
    requirement: "Tier 1 dedups candidates whose normalized surfaces are identical (within the batch and against an optional existing table), keeping the first occurrence and recording the rest as duplicates. O(n), always runs first."
    test: "packages/cairn-engine/tests/unit/test_ontology.py::test_dedup_tier1_exact_normalized"
    test_provenance: "execution_derived"
    execution_oracle:
      golden_fixture: "'Entity Resolution' vs 'entity-resolution' -> one unique + one duplicate"
    assumption_status: "KNOWN"
    entropy: "near-zero"
    priority: 4

  - name: "dedup_tier2_minhash_tokensort_gated"
    requirement: "Tier 2 generates near-duplicate pairs via MinHash/LSH (char-3-gram shingles, 32 permutations via blake2b with FIXED per-permutation salts, band size 4 -> 8 bands) and confirms with token-sort ratio: >= 0.85 -> duplicate; in [0.70, 0.85) -> review_pairs (flagged, NEVER auto-merged — that band is tier 3 / human territory); entropy gate: surfaces with < 1.5 bits skip fuzzy entirely."
    test: "packages/cairn-engine/tests/unit/test_ontology.py::test_dedup_tier2_minhash_tokensort"
    test_provenance: "execution_derived"
    execution_oracle:
      golden_fixture: "typo pair merges as duplicate; mid-band pair lands in review_pairs; low-entropy pair untouched"
    assumption_status: "KNOWN"
    entropy: "near-zero"
    priority: 3

  - name: "mirror_edges_deterministic"
    requirement: "with_mirror_edges adds, for each edge (a -[p]-> b) whose predicate is in the mirror map, the reverse edge (b -[mirror(p)]-> a) onto the TARGET entity, preserving bitemporal validity, deduplicating existing mirrors, and keeping deterministic edge order. Entities are never mutated — new frozen records are returned."
    test: "packages/cairn-engine/tests/unit/test_ontology.py::test_mirror_edges_deterministic"
    test_provenance: "execution_derived"
    execution_oracle:
      golden_fixture: "post -mentions-> concept produces concept -mentioned_in-> post with same validity window"
    assumption_status: "KNOWN"
    entropy: "near-zero"
    priority: 2

  - name: "serialization_roundtrip_deterministic"
    requirement: "dump_entities produces deterministic JSON (sorted keys, fixed separators, entities ordered by canonical_id); load_entities(dump_entities(x)) reconstructs records equal to x. JSON (stdlib) is the 0.1 format — YAML needs a third-party dep and would break the zero-dep core, so it is a future opt-in extra, not the default."
    test: "packages/cairn-engine/tests/unit/test_ontology.py::test_serialization_roundtrip_deterministic"
    test_provenance: "execution_derived"
    execution_oracle:
      property_test: "round-trip equality + dump(x) == dump(load(dump(x)))"
    assumption_status: "KNOWN"
    entropy: "near-zero"
    priority: 1

  - name: "staging_never_hotpath_never_network"
    requirement: "Authoring output is Candidate records with status 'pending_review' — nothing enters a frozen table except by the caller explicitly adding approved entities (the human gate). The entire authoring module is build-time: it makes zero network calls itself and works with sockets disabled."
    test: "packages/cairn-engine/tests/unit/test_ontology.py::test_staging_and_offline"
    test_provenance: "execution_derived"
    execution_oracle:
      property_test: "all candidates pending_review; full pipeline runs with socket.socket raising"
    assumption_status: "KNOWN"
    entropy: "near-zero"
    priority: 1

constraint_satisfiability:
  conflicts_checked: true
  known_tensions:
    - between: ["heuristic_extractor_deterministic", "extractors_explicit_never_autodetected"]
      resolution: "One built-in stdlib extractor ('heuristic'); everything else enters as a caller-owned callable — no hidden imports, no capability strings that trigger installs."
    - between: ["dedup_tier2_minhash_tokensort_gated", "serialization_roundtrip_deterministic"]
      resolution: "MinHash salts are fixed constants (not runtime-seeded), so dedup results and serialized output are both byte-stable."
  simultaneous_satisfaction: "All satisfiable: one stdlib pipeline, fixed salts, explicit human gate."
  joint_satisfaction_test: "packages/cairn-engine/tests/unit/test_ontology.py::test_joint_authoring_pipeline"

rationale:
  decision: "Stdlib heuristic default + callable extractors; MinHash/LSH with fixed salts; review-band never auto-merged; mirror-edge helper; deterministic JSON."
  reasoning: "OP-35: the freeze is the determinism boundary, so extractors may vary in power — but cairn itself must stay dependency-free and network-free (build_boundary: orchestrate extractors, never embed them). Tier-3 ambiguity is human territory (Fellegi-Sunter possible-link band, TH-1). Mirror edges: the M1.4 demo showed post->concept edges alone make next-reads asymmetric (OP-28 reversal mitigation)."
  evidence: "context/ONTOLOGY_AUTHORING_RESEARCH_2026.md; patterns_entities.yaml OP-35 v1.2 (llm_full_extraction is a first-class opt-in — as a CALLABLE); foundations/CANONICALIZATION_EQUIVALENCE_CLASSES_RESEARCH_2026.md"
  date: "2026-07-11"
  stakeholder: "Maintainer"

alternatives:
  - name: "YAML as the 0.1 serialization format (per the roadmap wording)"
    rejected_because: "The stdlib has no yaml module; PyYAML would be the core's first hard dependency. JSON (stdlib, sorted keys) is equally git-versionable and deterministic; YAML becomes an opt-in extra later. Zero-dep invariant beats format preference."
    date_tested: "2026-07-11"
  - name: "String names for third-party extractors (extractor='gliner' auto-imports)"
    rejected_because: "Hidden conditional imports make behavior environment-dependent and blur the no-network boundary. A callable keeps the third-party/API surface explicitly in the caller's hands."
    date_tested: "2026-07-11"

risks:
  - condition: "The heuristic extractor over-generates candidates on prose with many proper nouns."
    action: "Acceptable by design: it is a recall-oriented candidate generator feeding a human gate; precision comes from review + dedup, and from GLiNER/LLM callables when the user opts in."
    monitor: "M1.6 WordPress corpus authoring session"
    severity: "low"
  - condition: "MinHash on very short surfaces produces noisy bands."
    action: "Entropy gate (< 1.5 bits skips fuzzy) plus token-sort confirmation keep false merges out; ambiguous band goes to humans."
    monitor: "test_dedup_tier2_minhash_tokensort"
    severity: "low"

implementation:
  current: "authored alongside this intent (segmented per IVD Rule 1)"
  version: 1
  tests: "packages/cairn-engine/tests/unit/test_ontology.py; integration in tests/integration/"
  documentation: "module docstrings; ROADMAP M1.3"

verification:
  status: "tests authored with implementation; run in the project venv"
  test_cases:
    - name: "joint"
      description: "One authoring pipeline run (extract -> dedup -> mirror -> serialize -> approve -> freeze -> resolve) satisfying all constraints"
      input: {text: "blog paragraph", extractor: "heuristic"}
      expected_output: {staged: true, deterministic: true, offline: true, human_gate_respected: true}
      validates_constraint: "ALL (joint)"

changelog:
  - version: "0.1.3"
    date: "2026-07-11"
    change: "Expanded the heuristic extractor's fixed stopword list to a standard English function-word set (Rule-5, found running M1.6 authoring on the real 14-post blog: sentence-start words 'Every/Because/After/Someone/Just/Should/Same'… leaked as candidates and buried the concepts). The list deliberately excludes NO domain-ambiguous words (cloud/api/roi/check/pick/back/right all survive), verified by test. Also: clause punctuation now breaks capitalized runs ('Cloud, API and ROI' -> three candidates). Still fixed + deterministic."
    reason: "A candidate worksheet full of sentence-start noise is unusable for the human gate; a standard function-word list cleans it without touching real concepts."
  - version: "0.1.2"
    date: "2026-07-11"
    change: "Review fixes: long capitalized runs now chunk into consecutive <=5-token candidates (F9 — recall means never dropping tokens); existing-table duplicates carry an existing_table sentinel as `kept` (F11); added find_alias_conflicts() — the OP-35 conflict-audit CI gate (F19). Union-Find merge now folds refs and rewrites relation targets to representatives at freeze (F1, implemented in adapters/memory.py canonical_entities()); has_id/has_record semantics pinned on the Protocol (F7)."
    reason: "Fresh-eyes review against OP-35: reference forwarding was surface-only, breaking resolve->traverse coherence after merges."
  - version: "0.1.1"
    date: "2026-07-11"
    change: "Heuristic extractor gains a FIXED stopword filter (Rule 5 empirical refinement): on a real 14-post blog corpus, sentence-start pronouns/articles dominated the candidate list ('I' 14 posts, 'The' 14, 'You' 13) burying the real domain concepts (product names, LLMs, GitHub Copilot). Runs now trim leading/trailing stopwords; stopword/contraction single tokens are rejected; possessives stripped."
    reason: "Recall-oriented is right, but a human gate over 533 mostly-junk candidates is unusable — the fixed stopword list keeps determinism while making review tractable."
  - version: "0.1.0"
    date: "2026-07-11"
    change: "Initial module intent for ontology authoring (M1.3): 7 constraints, critical-last. Decisions recorded: JSON-not-YAML for 0.1 (zero-dep), callable-not-string extractors (no hidden imports/network), review band never auto-merged, mirror-edge helper from the M1.4 finding."
    reason: "IVD Rule 1 — intent before implementation."
