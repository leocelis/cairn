changelog:
  - version: "1.2"
    date: "2026-06-29"
    change: >
      OP-35: promoted LLM extraction from tail-only to a FIRST-CLASS OPT-IN strategy
      (llm_full_extraction) for unstructured prose with open-ended concepts — build-time
      offline batch, structured output, human gate, result FROZEN. Interface:
      author_from_text(..., extractor="llm"); "discriminative" remains the default.
      llm_assisted_tail narrowed back to the <5% dedup band.
    reason: >
      Real use cases (WordPress/blog concept graphs) need full-text LLM concept extraction,
      not just ambiguity arbitration. Safe because determinism comes from the freeze, not
      the extractor — only hot-path/per-query LLM extraction (Graphiti drift) breaks the thesis.
  - version: "1.1"
    date: "2026-06-27"
    change: >
      OP-35 reframed against ENTITY_RELATIONSHIP_RESOLUTION research: extraction LEADS with
      'reliable AND mostly deterministic' (discriminative methods — GLiNER/ReLiK/REBEL/multi-agent ER,
      90-94%+ accuracy, byte-stable), with the generative LLM demoted to the <5% ambiguous tail.
      Added extraction_is_reliable_and_mostly_deterministic block with verified research numbers;
      reordered construction_strategies (structured-source / discriminative-default / manual / llm-tail);
      design_rule now states the determinism boundary = the frozen table, not the extraction process.
    reason: "Prior framing over-emphasized the LLM + human gate, implying extraction was fragile. The research shows the opposite: reliability and determinism are both achievable via discriminative methods; the LLM is the tail, not the default."
  - version: "1.0"
    date: "2026-06-27"
    change: >
      Created the ENTITY subsystem pattern file. Organized by subsystem (not abstraction level):
      co-locates theory (TH-1..TH-5, from docs/research/foundations/) with operational patterns
      (OP-28, OP-34, OP-35, moved verbatim from patterns_retrieval_knowledge.yaml v1.7).
    reason: >
      The entity map is Cairn's foundational subsystem (Primitive B); 4 of the 5 CS theories researched
      are entity theories and the 5th (traversal) walks the entity graph. Co-locating theory + operational
      in one file means working on entities reads one file. Mirrors the research/foundations/ structure.
      First step of an eventual per-subsystem decomposition (gate / entities / orchestration / assembler / eval).
    moved_from_retrieval_knowledge: "OP-28, OP-34, OP-35 (removed there in v1.8)"
    open_items_for_tech_spec:
      - "TH-3: pin open-end sentinel (NULL vs +∞) in OP-35 schema for half-open interval comparison"
      - "TH-5: enforce cwa_resolution_semantics (resolver returns explicit unresolved, never synthesizes an ID)"
      - "TH-5: enforce entities_are_immutable_value_records (no entity class carries methods; behavior in core/)"
      - "OP-28: reconcile tool-routing framing vs entity-first retrieval framing"
